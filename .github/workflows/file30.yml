name: Build_VM_linux_windows_container
on:
  push:
    branches:
      - main
jobs:
  linux_machine:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "${{ runner.os }}"
          echo "${{ runner.arch }}"
          echo "${{ runner.name }}"
  widnows_machine:
    runs-on: windows-latest
    steps:
      - shell: pwsh
        run: |
          echo "${{ runner.os }}"
          echo "${{ runner.arch }}"
          echo "${{ runner.name }}"
  container_machine:
    runs-on: ubuntu-latest
    container: 
      image: alpine:3.20
    steps:
      - run: |
          echo "${{ runner.os }}"
          echo "${{ runner.arch }}"
          echo "${{ runner.name }}"
          cat /etc/os-release