name: Flask_app
on:
  workflow_dispatch:
    
jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Create_package
        run: |
          mkdir dist
          echo "Flask app" >> dist/app.txt
          echo date >> dist/app.txt
      - name: Upload_package
        uses: actions/upload-artifact@v4
        with:
          name: Flask_package
          path: dist/
  Deploy:
    runs-on: ubuntu-latest
    needs:
      - Build
    steps:
      - name: Download_package
        uses: actions/download-artifact@v5
        with:
          name: Flask_package
      - name: Verify_package
        run: |
          cat app.txt
          ls -R
    
      
