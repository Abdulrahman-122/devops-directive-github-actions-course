name: compare_between_machine_container
on:
  push:
    branches:
      - main
jobs:
  Linux_machine:
    runs-on: ubuntu-latest
    steps:
      - run: cat /etc/os-release
  Container_machine:
    runs-on: ubuntu-latest
    container:
      image: alpine:3.20
    steps:
      - run: cat /etc/os-release


